<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github-Issue-Tracker</title>

    <link rel="stylesheet" href="./style.css">   

    <!-- daisyui-tailwind -->
<link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<!-- get font -->
 <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>

    <!-- navbar -->
<nav>
  <div class="navbar bg-base-100 shadow-sm">
  <div class="flex-1">
    <div class="flex">
        <img src="./assets/github-logo.png" alt=""class="w-[36px] h-[36px]">
        <a class="btn btn-ghost md:text-xl">GitHub Issues Tracker</a>
  </div>
</div>
<div class="flex space-x-3 md:gap-8">

<input type="text"id="search-input"placeholder="Search issues..."class="input  w-24 md:w-auto "/>

<button id="search-btn" class="btn btn-primary w-auto">Search</button>

</div>
</div>

</nav>


<div class="w-11/12 mx-auto mt-16">

<!-- btn -->
<div class="flex gap-5 bg-gray-300 h-[88px] rounded-2xl items-center px-6">
  <button id="allBtn" onclick="showAll()" class="btn btn-primary">All</button>
  <button id="openBtn" onclick="showOpen()" class="btn">Open</button>
  <button id="closedBtn" onclick="showClosed()" class="btn">Closed</button>
</div>


<!-- Issue check -->
<div class="flex justify-between items-center mt-6 border-2 border-gray-300 rounded-md pb-3 h-[90px] p-5">

<div class="flex items-center gap-2">
<i class="fa-brands fa-web-awesome"></i>
<p id="issue-count" class="font-semibold">0 Issues</p>
</div>


<div class="flex gap-5 text-sm">

<span class="flex items-center gap-1 text-green-600">
<i class="fa-solid fa-circle"></i> Open
</span>

<span class="flex items-center gap-1 text-purple-600">
<i class="fa-solid fa-circle"></i> Closed
</span>

</div>

</div>



<!-- Issue cards -->
<div id="issue-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mt-8">

</div>

</div>



<!-- <button class="btn" onclick="my_modal_5.showModal()">open modal</button> -->
<dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
  <div class="modal-box w-11/12 max-w-lg mx-auto">

    <h3 id="modal-title" class="text-lg sm:text-xl font-bold">Hello!</h3>
    <p id="modal-date" class="text-gray-500 font-semibold text-sm mt-1"></p>
    <p id="modal-description" class="py-3 text-sm sm:text-base"></p>
    <p id="modal-author" class="text-xs sm:text-sm text-gray-500 mb-3"></p>
    <p id="modal-labels" class="text-red-400 font-semibold text-sm mb-2"></p>
    <div class="flex flex-col sm:flex-row sm:justify-between gap-3">
    <p id="modal-priority"
        class="text-sm sm:text-base text-white bg-red-500 py-1 px-3 rounded-md text-center w-full sm:w-[110px]">
    </p>

    <h2 id="modal-status"
        class="text-sm sm:text-base bg-green-500 text-white py-1 px-3 rounded-md text-center w-full sm:w-[80px]">
    </h2>

    </div>

    <div class="modal-action">
      <form method="dialog">
      <button class="btn btn-primary w-full sm:w-auto">Close</button>
      </form>
    </div>

  </div>
</dialog>

    <script src="/script.js/home.js"></script>
</body>
</html>
